# Release workflow.
#
# Required repo secrets:
#   HOMEBREW_TAP_TOKEN — personal access token with "contents:write" on
#                         the homebrew-tap repo so goreleaser can push
#                         an updated formula. The default GITHUB_TOKEN
#                         only scopes to this repo and cannot reach the
#                         tap repo.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        working-directory: hermes-agent-go
        run: go test -race -cover ./...

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
