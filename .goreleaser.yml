version: 2

project_name: hermind

before:
  hooks:
    - go -C hermind mod tidy
    - go -C hermind test ./...

builds:
  - id: hermind
    main: ./cmd/hermind
    binary: hermind
    dir: hermind
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.BuildDate={{.Date}}

archives:
  - id: hermind
    ids: [hermind]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

brews:
  - name: hermind
    ids: [hermind]
    homepage: https://github.com/odysseythink/hermind
    description: "Hermind — Go port of the hermes AI agent framework"
    license: MIT
    repository:
      owner: odysseythink
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    commit_author:
      name: hermind-release-bot
      email: hermind-release-bot@users.noreply.github.com
    commit_msg_template: "brew: update hermind to {{ .Tag }}"
    install: |
      bin.install "hermind"
    test: |
      system "#{bin}/hermind", "version"

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  draft: true
  prerelease: auto
